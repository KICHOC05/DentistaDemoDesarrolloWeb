<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentistaDemo - Citas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle">Gestion de Citas Dentales</p>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Todas las Citas</h2>
            <div class="header-actions">
                <a th:href="@{/web/appointments/new}" class="btn btn-success">Nueva Cita</a>
                <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(appointments)}" class="empty-state">
            <p>No hay citas registradas.</p>
        </div>

        <div th:unless="${#lists.isEmpty(appointments)}" class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Doctor</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Motivo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appointment : ${appointments}">
                        <td th:text="${appointment.patientName}">Paciente</td>
                        <td th:text="${appointment.doctorName}">Doctor</td>
                        <td th:text="${appointment.appointmentDate}">Fecha</td>
                        <td th:text="${appointment.startTime}">Hora</td>
                        <td th:text="${appointment.reason}">Motivo</td>
                        <td>
                            <span class="status-badge" th:classappend="${appointment.statusClass}" th:text="${appointment.status}">
                            </span>
                        </td>
                        <td class="actions-cell">
                            <button th:if="${appointment.status == 'PENDING'}"
                                    class="btn btn-sm btn-confirm"
                                    th:attr="data-public-id=${appointment.publicId}"
                                    onclick="confirmAppointment(this.getAttribute('data-public-id'))">
                                Confirmar
                            </button>
                            <button th:if="${appointment.status != 'COMPLETED'}"
                                    class="btn btn-sm btn-cancel"
                                    th:attr="data-public-id=${appointment.publicId}"
                                    onclick="cancelAppointment(this.getAttribute('data-public-id'))">
                                Cancelar
                            </button>
                            <button th:if="${appointment.status == 'PENDING' or appointment.status == 'CONFIRMED'}"
                                    class="btn btn-sm btn-complete"
                                    th:attr="data-public-id=${appointment.publicId}"
                                    onclick="completeAppointment(this.getAttribute('data-public-id'))">
                                Completar
                            </button>
                            <span th:if="${appointment.status == 'COMPLETED' or appointment.status == 'CANCELLED'}"
                                  class="no-action">—</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script th:src="@{/js/appointments.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentistaDemo - Nueva Cita</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle">Nueva Cita Dental</p>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Registrar Nueva Cita</h2>
            <a th:href="@{/web/appointments}" class="btn btn-secondary">Volver a Citas</a>
        </div>

        <div class="form-card">
            <form th:action="@{/web/appointments}" th:object="${request}" method="post" class="form">
                <div class="form-group">
                    <label for="patientPublicId">Paciente</label>
                    <select id="patientPublicId" th:field="*{patientPublicId}" class="form-control" required>
                        <option value="">Seleccione un paciente</option>
                        <option th:each="patient : ${patients}"
                                th:value="${patient.publicId}"
                                th:text="${patient.fullName} + ' (' + ${patient.publicId} + ')'">
                        </option>
                    </select>
                    <small class="form-text error" th:if="${#fields.hasErrors('patientPublicId')}" th:errors="*{patientPublicId}">Error</small>
                </div>

                <div class="form-group">
                    <label for="doctorPublicId">Doctor</label>
                    <select id="doctorPublicId" th:field="*{doctorPublicId}" class="form-control" required>
                        <option value="">Seleccione un doctor</option>
                        <option th:each="doctor : ${doctors}"
                                th:value="${doctor.publicId}"
                                th:text="${doctor.fullName} + ' - ' + ${doctor.specialty} + ' (' + ${doctor.publicId} + ')'">
                        </option>
                    </select>
                    <small class="form-text error" th:if="${#fields.hasErrors('doctorPublicId')}" th:errors="*{doctorPublicId}">Error</small>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="appointmentDate">Fecha de la Cita</label>
                        <input type="date" id="appointmentDate" th:field="*{appointmentDate}" class="form-control" required>
                        <small class="form-text error" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}">Error</small>
                    </div>

                    <div class="form-group">
                        <label for="startTime">Hora de Inicio</label>
                        <input type="time" id="startTime" th:field="*{startTime}" class="form-control" required>
                        <small class="form-text error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}">Error</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reason">Motivo de la Cita</label>
                    <textarea id="reason" th:field="*{reason}" class="form-control" rows="3" placeholder="Describa el motivo de la consulta" required></textarea>
                    <small class="form-text error" th:if="${#fields.hasErrors('reason')}" th:errors="*{reason}">Error</small>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Crear Cita</button>
                    <a th:href="@{/web/appointments}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS. Todos los derechos reservados.</p>
        </div>
    </footer>
</body>
</html>

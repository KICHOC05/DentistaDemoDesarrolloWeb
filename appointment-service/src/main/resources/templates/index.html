<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Clinica Dental SaaS</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle">Clinica Dental SaaS</p>

    </header>

    <main class="container">
        <div class="hero">
            <h2>Bienvenido a DentistaDemo</h2>
            <p>Sistema de Gestion Dental</p>

            <a th:href="@{/web/login}" class="card card-primary">

                <h3>Iniciar Sesion</h3>
                <p>Acceda al sistema con sus credenciales</p>

        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS</p>
        </div>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="token" th:content="${token}">
    <title>Nueva Cita</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle">Nueva Cita</p>
            <div>
                <a th:href="@{/web/appointments}" class="btn btn-sm btn-secondary">Volver</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-card">
            <form th:action="@{/web/appointments}" th:object="${request}" method="post" class="form">
                <div class="form-group">
                    <label for="patientPublicId">Paciente</label>
                    <select id="patientPublicId" th:field="*{patientPublicId}" class="form-control" required>
                        <option value="">-- Seleccionar Paciente --</option>
                        <option th:each="p : ${patients}" th:value="${p.publicId}" th:text="${p.fullName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="doctorPublicId">Doctor</label>
                    <select id="doctorPublicId" th:field="*{doctorPublicId}" class="form-control" required>
                        <option value="">-- Seleccionar Doctor --</option>
                        <option th:each="d : ${doctors}" th:value="${d.publicId}" th:text="${d.fullName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="appointmentDate">Fecha</label>
                    <input type="date" id="appointmentDate" th:field="*{appointmentDate}" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="startTime">Hora de Inicio</label>
                        <input type="time" id="startTime" th:field="*{startTime}" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">Hora de Fin</label>
                        <input type="time" id="endTime" th:field="*{endTime}" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reason">Motivo</label>
                    <textarea id="reason" th:field="*{reason}" class="form-control" rows="3" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Guardar Cita</button>
                    <a th:href="@{/web/appointments}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS</p>
        </div>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="token" th:content="${token}">
    <title th:if="${publicId == null}">Nuevo Doctor</title>
    <title th:unless="${publicId == null}">Editar Doctor</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle" th:if="${publicId == null}">Nuevo Doctor</p>
            <p class="subtitle" th:unless="${publicId == null}">Editar Doctor</p>
            <div>
                <a th:href="@{/web/doctors}" class="btn btn-sm btn-secondary">Volver</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="form-card">
            <form th:action="${publicId != null} ? @{/web/doctors/{id}/edit(id=${publicId})} : @{/web/doctors}"
                  th:object="${doctorRequest}" method="post" class="form">
                <div class="form-group">
                    <label for="fullName">Nombre Completo</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="specialty">Especialidad</label>
                    <input type="text" id="specialty" th:field="*{specialty}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a th:href="@{/web/doctors}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS</p>
        </div>
    </footer>
</body>
</html>

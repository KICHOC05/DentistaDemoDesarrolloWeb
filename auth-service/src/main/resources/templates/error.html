<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - DentistaDemo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
        </div>
    </header>
    <main class="container">
        <div class="login-card">
            <h2 th:if="${status == 404}">Pagina no encontrada</h2>
            <h2 th:if="${status == 403 or status == 401}">Acceso denegado</h2>
            <h2 th:if="${status != 404 and status != 403 and status != 401}">Error inesperado</h2>
            <p>Debes acceder a la aplicación a través del puerto de entrada.</p>
            <p>
                <a th:href="@{/web/login}" class="btn btn-primary">
                    Ir al inicio de sesion
                </a>
            </p>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS</p>
        </div>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentistaDemo - Inicio de Sesion</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">DentistaDemo</h1>
            <p class="subtitle">Sistema de Gestion Dental</p>
        </div>
    </header>

    <main class="container">
        <div class="login-card">
            <h2>Iniciar Sesion</h2>
            <form th:action="@{/web/login}" th:object="${loginRequest}" method="post" class="form">
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Nombre de usuario" required>
                    <small class="form-text error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Error</small>
                </div>

                <div class="form-group">
                    <label for="password">Contrasena</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Contrasena" required>
                    <small class="form-text error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Error</small>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 DentistaDemo - ClinicaDentalSaaS</p>
        </div>
    </footer>
</body>
</html>
